<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c47d5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d99573;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8694d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c47d5a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Logo Icon -->
  <g transform="translate(10, 10)">
    <circle cx="50" cy="50" r="45" fill="url(#primaryGradient)" opacity="0.1"/>
    <g transform="translate(25, 25)">
      <rect x="20" y="10" width="10" height="30" fill="url(#iconGradient)" rx="2"/>
      <rect x="10" y="20" width="30" height="10" fill="url(#iconGradient)" rx="2"/>
      <circle cx="8" cy="8" r="3" fill="#5aada8" opacity="0.8"/>
      <circle cx="42" cy="8" r="3" fill="#5aada8" opacity="0.8"/>
      <circle cx="8" cy="42" r="3" fill="#5aada8" opacity="0.8"/>
      <circle cx="42" cy="42" r="3" fill="#5aada8" opacity="0.8"/>
      <line x1="11" y1="8" x2="20" y2="15" stroke="#c47d5a" stroke-width="2" opacity="0.6"/>
      <line x1="39" y1="8" x2="30" y2="15" stroke="#c47d5a" stroke-width="2" opacity="0.6"/>
      <line x1="8" y1="39" x2="15" y2="30" stroke="#c47d5a" stroke-width="2" opacity="0.6"/>
      <line x1="42" y1="39" x2="35" y2="30" stroke="#c47d5a" stroke-width="2" opacity="0.6"/>
    </g>
    <circle cx="50" cy="50" r="35" fill="none" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.3">
      <animate attributeName="r" values="35;40;35" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Company Name -->
  <g transform="translate(120, 35)">
    <text x="0" y="25" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#1a1d27">
      ClinicIT
    </text>
    <circle cx="105" cy="15" r="4" fill="url(#primaryGradient)"/>
    <text x="115" y="25" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="url(#primaryGradient)">
      Solutions
    </text>
    <text x="0" y="50" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="500" fill="#9b978f" opacity="0.8">
      Transforming WA Healthcare with Expert IT Solutions
    </text>
  </g>
</svg>