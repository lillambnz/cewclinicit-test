<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c47d5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d99573;stop-opacity:1" />
    </linearGradient>
  </defs>

  <circle cx="50" cy="50" r="45" fill="url(#primaryGradient)"/>

  <g transform="translate(25, 25)">
    <rect x="20" y="10" width="10" height="30" fill="white" rx="2"/>
    <rect x="10" y="20" width="30" height="10" fill="white" rx="2"/>
    <circle cx="8" cy="8" r="3" fill="white" opacity="0.9"/>
    <circle cx="42" cy="8" r="3" fill="white" opacity="0.9"/>
    <circle cx="8" cy="42" r="3" fill="white" opacity="0.9"/>
    <circle cx="42" cy="42" r="3" fill="white" opacity="0.9"/>
    <line x1="11" y1="8" x2="20" y2="15" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="39" y1="8" x2="30" y2="15" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="8" y1="39" x2="15" y2="30" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="42" y1="39" x2="35" y2="30" stroke="white" stroke-width="2" opacity="0.7"/>
  </g>

  <circle cx="50" cy="50" r="35" fill="none" stroke="white" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="35;38;35" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>