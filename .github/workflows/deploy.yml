on:
    push:
      branches:
        - main
    workflow_dispatch:

  jobs:
    deploy:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        deployments: write
      name: Deploy to Cloudflare Pages
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Deploy to Cloudflare Pages
          uses: cloudflare/pages-action@v1
          with:
            apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            accountId: f1559c38e9be3c40223ea1b7128fc37a
            projectName: clinicit-solutions
            directory: .
            gitHubToken: ${{ secrets.GITHUB_TOKEN }}
