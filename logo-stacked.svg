<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c47d5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d99573;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8694d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c47d5a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(125, 10)">
    <circle cx="25" cy="25" r="22" fill="url(#primaryGradient)" opacity="0.1"/>
    <g transform="translate(12.5, 12.5)">
      <rect x="10" y="5" width="5" height="15" fill="url(#iconGradient)" rx="1"/>
      <rect x="5" y="10" width="15" height="5" fill="url(#iconGradient)" rx="1"/>
      <circle cx="4" cy="4" r="1.5" fill="#5aada8" opacity="0.8"/>
      <circle cx="21" cy="4" r="1.5" fill="#5aada8" opacity="0.8"/>
      <circle cx="4" cy="21" r="1.5" fill="#5aada8" opacity="0.8"/>
      <circle cx="21" cy="21" r="1.5" fill="#5aada8" opacity="0.8"/>
      <line x1="5.5" y1="4" x2="10" y2="7.5" stroke="#c47d5a" stroke-width="1" opacity="0.6"/>
      <line x1="19.5" y1="4" x2="15" y2="7.5" stroke="#c47d5a" stroke-width="1" opacity="0.6"/>
      <line x1="4" y1="19.5" x2="7.5" y2="15" stroke="#c47d5a" stroke-width="1" opacity="0.6"/>
      <line x1="21" y1="19.5" x2="17.5" y2="15" stroke="#c47d5a" stroke-width="1" opacity="0.6"/>
    </g>
    <circle cx="25" cy="25" r="18" fill="none" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="18;20;18" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(150, 90)">
    <text x="0" y="0" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="700" fill="#1a1d27" text-anchor="middle">
      ClinicIT
    </text>
    <circle cx="60" cy="-8" r="3" fill="url(#primaryGradient)"/>
    <text x="0" y="35" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="700" fill="url(#primaryGradient)" text-anchor="middle">
      Solutions
    </text>
    <text x="0" y="55" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#9b978f" opacity="0.8" text-anchor="middle">
      Transforming WA Healthcare with Expert IT Solutions
    </text>
  </g>
</svg>