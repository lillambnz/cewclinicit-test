<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="whiteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f9f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo Icon -->
  <g transform="translate(10, 10)">
    <!-- Outer Circle -->
    <circle cx="50" cy="50" r="45" fill="white" opacity="0.1"/>
    
    <!-- Medical Cross + Tech Circuit -->
    <g transform="translate(25, 25)">
      <!-- Medical Cross -->
      <rect x="20" y="10" width="10" height="30" fill="white" rx="2"/>
      <rect x="10" y="20" width="30" height="10" fill="white" rx="2"/>
      
      <!-- Tech Circuit Elements -->
      <circle cx="8" cy="8" r="3" fill="#f0f9f6" opacity="0.9"/>
      <circle cx="42" cy="8" r="3" fill="#f0f9f6" opacity="0.9"/>
      <circle cx="8" cy="42" r="3" fill="#f0f9f6" opacity="0.9"/>
      <circle cx="42" cy="42" r="3" fill="#f0f9f6" opacity="0.9"/>
      
      <!-- Connecting Lines -->
      <line x1="11" y1="8" x2="20" y2="15" stroke="white" stroke-width="2" opacity="0.7"/>
      <line x1="39" y1="8" x2="30" y2="15" stroke="white" stroke-width="2" opacity="0.7"/>
      <line x1="8" y1="39" x2="15" y2="30" stroke="white" stroke-width="2" opacity="0.7"/>
      <line x1="42" y1="39" x2="35" y2="30" stroke="white" stroke-width="2" opacity="0.7"/>
    </g>
    
    <!-- Pulse Animation Ring -->
    <circle cx="50" cy="50" r="35" fill="none" stroke="white" stroke-width="2" opacity="0.4">
      <animate attributeName="r" values="35;40;35" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.2;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Company Name -->
  <g transform="translate(120, 35)">
    <!-- ClinicIT -->
    <text x="0" y="25" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="700" fill="white">
      ClinicIT
    </text>
    
    <!-- Dot -->
    <circle cx="105" cy="15" r="4" fill="white"/>
    
    <!-- Solutions -->
    <text x="115" y="25" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="700" fill="white">
      Solutions
    </text>
    
    <!-- Tagline -->
    <text x="0" y="50" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500" fill="white" opacity="0.8">
      Transforming WA Healthcare with Expert IT Solutions
    </text>
  </g>
</svg>